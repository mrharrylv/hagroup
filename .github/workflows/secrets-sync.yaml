name: Sync Gmail Secrets to Firebase (Google Secret Manager)

# Copies the Gmail credentials stored as GitHub Actions secrets into Google
# Secret Manager, where the Firebase Functions read them at runtime via
# `defineSecret(...)` (services/firebase/functions/src/index.ts).
#
#   GitHub Actions secret ──(GCP OIDC / Workload Identity Federation)──► Google Secret Manager
#
# Use this to rotate the Gmail App Password WITHOUT redeploying all functions.
# NOTE: Cloud Functions (2nd gen) bind to a specific secret version at deploy
# time, so a freshly-pushed version only takes effect after the next deploy —
# run the "Deploy Firebase" workflow (firebase.yaml) to bind it.
#
# Required GitHub Actions secrets (repository- or environment-level):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  full provider resource name
#   GCP_SERVICE_ACCOUNT             deployer SA email (needs roles/secretmanager.admin)
#   GMAIL_ADDRESS                   Gmail address (sender + recipient)
#   GMAIL_APP_PASSWORD              16-char Gmail App Password
#
# These mirror .secrets/.env.gmail. Firebase web config (VITE_FIREBASE_*) is NOT
# handled here — it is public client config injected at build time in deploy.yaml.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to read secrets from (single Firebase project either way)"
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # required for GCP Workload Identity Federation
  contents: read

env:
  NODE_VERSION: "20"
  FIREBASE_PROJECT: hagroup-47ebc
  FIREBASE_DIR: services/firebase

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      # Fail fast BEFORE authenticating to GCP if a secret is missing.
      - name: Validate required secrets are present
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          missing=()
          if [ -z "${GMAIL_ADDRESS:-}" ]; then missing+=("GMAIL_ADDRESS"); fi
          if [ -z "${GMAIL_APP_PASSWORD:-}" ]; then missing+=("GMAIL_APP_PASSWORD"); fi
          if [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ]; then missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER"); fi
          if [ -z "${GCP_SERVICE_ACCOUNT:-}" ]; then missing+=("GCP_SERVICE_ACCOUNT"); fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            echo "(repository secrets, or the '${{ github.event.inputs.environment }}' environment)."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Push Gmail credentials to Google Secret Manager
        working-directory: ${{ env.FIREBASE_DIR }}
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          set -euo pipefail
          # `--data-file=-` reads the value from stdin, so nothing is echoed and
          # the secret never appears in the process list or the logs. Each call
          # adds a new Secret Manager version (labelled firebase-managed).
          printf '%s' "$GMAIL_ADDRESS"      | firebase functions:secrets:set GMAIL_ADDRESS      --data-file=- --project "$FIREBASE_PROJECT"
          printf '%s' "$GMAIL_APP_PASSWORD" | firebase functions:secrets:set GMAIL_APP_PASSWORD --data-file=- --project "$FIREBASE_PROJECT"

      - name: Summary
        run: |
          echo "=============================================="
          echo "Gmail secrets synced to Google Secret Manager"
          echo "  Firebase project : ${FIREBASE_PROJECT}"
          echo "  Keys             : GMAIL_ADDRESS, GMAIL_APP_PASSWORD"
          echo "  Reminder         : run 'Deploy Firebase' (firebase.yaml) to bind the new version"
          echo "=============================================="
