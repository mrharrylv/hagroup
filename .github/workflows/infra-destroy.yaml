name: Terraform Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      confirm_destruction:
        description: "Type 'DESTROY' to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_WORKING_DIR: infrastructure/terraform

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Validate destruction request
        id: check
        run: |
          if [ "${{ github.event.inputs.confirm_destruction }}" != "DESTROY" ]; then
            echo "❌ Destruction not confirmed. You must type 'DESTROY' to proceed."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "⚠️ DESTRUCTION CONFIRMED for environment: ${{ github.event.inputs.environment }}"
          echo "proceed=true" >> $GITHUB_OUTPUT

  destroy:
    needs: validate
    if: needs.validate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Display destruction warning
        run: |
          echo "=============================================="
          echo "⚠️  DESTROYING INFRASTRUCTURE"
          echo "=============================================="
          echo "🎯 ENVIRONMENT: ${{ github.event.inputs.environment }}"
          echo "📍 Git Ref: ${{ github.ref }}"
          echo "=============================================="
          echo ""
          echo "This action will permanently destroy all infrastructure"
          echo "resources in the ${{ github.event.inputs.environment }} environment."
          echo ""
          echo "=============================================="

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::561341419749:role/github-oidc-hagroup-${{ github.event.inputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy \
            -var-file="environments/${{ github.event.inputs.environment }}.tfvars" \
            -auto-approve

      - name: Destruction Complete
        run: |
          echo "=============================================="
          echo "✅ DESTRUCTION COMPLETE"
          echo "=============================================="
          echo "Environment ${{ github.event.inputs.environment }} has been destroyed."
          echo "=============================================="
