name: Sync Secrets to AWS

# Securely copies application secrets that are stored as GitHub Actions secrets
# into AWS Secrets Manager, where an AWS-hosted backend can read them at runtime.
#
#   GitHub Actions secret  ──(OIDC, no static keys)──►  AWS Secrets Manager
#
# Least privilege: the OIDC role may only touch the `<env>-hagroup-gmail` secret
# (see infrastructure/aws/setup.sh → "AppSecretsSync" statement). The secret
# *container* is provisioned by Terraform (infrastructure/terraform/secrets.tf);
# this workflow only writes its value.
#
# Required GitHub Actions secrets (repository- or environment-level):
#   GMAIL_ADDRESS        Gmail address (sender + recipient)
#   GMAIL_APP_PASSWORD   16-char Gmail App Password
#
# These mirror .secrets/.env.gmail. Firebase web config (VITE_FIREBASE_*) is NOT
# handled here — it is public client config injected at build time in deploy.yaml.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: eu-north-1
  PROJECT: hagroup   # matches hagroup AWS resource naming

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      # Fail fast BEFORE assuming any AWS role if a secret is missing.
      - name: Validate required secrets are present
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          missing=()
          if [ -z "${GMAIL_ADDRESS:-}" ]; then missing+=("GMAIL_ADDRESS"); fi
          if [ -z "${GMAIL_APP_PASSWORD:-}" ]; then missing+=("GMAIL_APP_PASSWORD"); fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions"
            echo "(repository secrets, or the '${{ github.event.inputs.environment }}' environment)."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::561341419749:role/github-oidc-hagroup-${{ github.event.inputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push Gmail credentials to AWS Secrets Manager
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment }}"
          SECRET_ID="${ENV}-${PROJECT}-gmail"

          # The secret container is provisioned by Terraform (infrastructure/terraform/secrets.tf).
          # Fail clearly if the infra workflow hasn't created it yet.
          if ! aws secretsmanager describe-secret --secret-id "$SECRET_ID" >/dev/null 2>&1; then
            echo "::error::Secret '$SECRET_ID' does not exist yet."
            echo "Run the 'Terraform Infrastructure' workflow first — it provisions the secret container."
            exit 1
          fi

          # Build the JSON payload in a 0600 temp file (umask 077). jq escapes the
          # values, nothing is echoed, and AWS reads the value via file:// so the
          # secret never appears in the process argument list or the logs.
          umask 077
          payload="$(mktemp)"
          trap 'rm -f "$payload"' EXIT
          jq -n \
            --arg addr "$GMAIL_ADDRESS" \
            --arg pass "$GMAIL_APP_PASSWORD" \
            '{GMAIL_ADDRESS: $addr, GMAIL_APP_PASSWORD: $pass}' > "$payload"

          version_id="$(aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ID" \
            --secret-string "file://$payload" \
            --query 'VersionId' --output text)"

          echo "Stored new version $version_id of $SECRET_ID."

      - name: Summary
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "=============================================="
          echo "Secrets synced to AWS Secrets Manager"
          echo "  Environment : $ENV"
          echo "  Secret      : ${ENV}-${PROJECT}-gmail"
          echo "  Region      : ${AWS_REGION}"
          echo "  Keys        : GMAIL_ADDRESS, GMAIL_APP_PASSWORD"
          echo "=============================================="
